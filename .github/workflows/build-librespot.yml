name: Build librespot binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: spoton
  SOURCE_DIR: librespot-spoton

jobs:
  detect-changes:
    name: Detect Rust source changes
    runs-on: ubuntu-latest
    outputs:
      rust_changed: ${{ steps.check.outputs.rust_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Rust source changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "workflow_dispatch detected — forcing full build"
            RUST_CHANGED=true
          else
            PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
            if [ -z "$PREV_TAG" ]; then
              echo "No previous tag found — forcing full build"
              RUST_CHANGED=true
            else
              echo "Previous tag: $PREV_TAG"
              CHANGED=$(git diff --name-only "$PREV_TAG" "$GITHUB_REF_NAME" -- librespot-spoton/ | head -1)
              if [ -n "$CHANGED" ]; then
                RUST_CHANGED=true
              else
                RUST_CHANGED=false
              fi
            fi
          fi
          echo "Rust changed: $RUST_CHANGED"
          echo "rust_changed=$RUST_CHANGED" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.rust_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            bin_dir: x86_64-linux
            use_cross: true
          - target: aarch64-unknown-linux-musl
            bin_dir: aarch64-linux
            use_cross: true
          - target: armv7-unknown-linux-musleabihf
            bin_dir: armhf-linux
            use_cross: true
          - target: arm-unknown-linux-musleabi
            bin_dir: arm-linux
            use_cross: true
          - target: i686-unknown-linux-musl
            bin_dir: i386-linux
            use_cross: true
          - target: x86_64-pc-windows-gnu
            bin_dir: x86_64-win64
            binary_ext: .exe
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux targets only)
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install MinGW-w64 (Windows target only)
        if: matrix.use_cross == false
        run: sudo apt-get install -y gcc-mingw-w64-x86-64-posix

      - name: Configure linker for Windows target
        if: matrix.use_cross == false
        run: |
          mkdir -p $HOME/.cargo
          cat >> $HOME/.cargo/config.toml <<'EOF'
          [target.x86_64-pc-windows-gnu]
          linker = "x86_64-w64-mingw32-gcc"
          EOF

      - name: Build binary (cross)
        if: matrix.use_cross == true
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          cross build --release --target ${{ matrix.target }}

      - name: Build binary (cargo)
        if: matrix.use_cross == false
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        run: |
          EXT="${{ matrix.binary_ext }}"
          BINARY_PATH="${{ env.SOURCE_DIR }}/target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${EXT}"
          DEST_DIR="Plugins/SpotOn/Bin/${{ matrix.bin_dir }}"
          mkdir -p "$DEST_DIR"
          cp "$BINARY_PATH" "$DEST_DIR/${{ env.BINARY_NAME }}${EXT}"
          chmod 755 "$DEST_DIR/${{ env.BINARY_NAME }}${EXT}"
          # Remove .gitkeep if present (binary replaces placeholder)
          rm -f "$DEST_DIR/.gitkeep"

      - name: Verify binary
        run: |
          EXT="${{ matrix.binary_ext }}"
          BINARY="Plugins/SpotOn/Bin/${{ matrix.bin_dir }}/${{ env.BINARY_NAME }}${EXT}"
          echo "=== Binary info ==="
          file "$BINARY"
          echo "=== Binary size ==="
          ls -la "$BINARY"
          echo "=== SHA256 checksum ==="
          sha256sum "$BINARY"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: spoton-${{ matrix.bin_dir }}
          path: Plugins/SpotOn/Bin/${{ matrix.bin_dir }}/spoton${{ matrix.binary_ext }}
          retention-days: 30

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    needs: [detect-changes]
    if: needs.detect-changes.outputs.rust_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            os: macos-15
            target: aarch64-apple-darwin
          - arch: x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        working-directory: ${{ env.SOURCE_DIR }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        run: |
          BINARY_PATH="${{ env.SOURCE_DIR }}/target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          chmod 755 "$BINARY_PATH"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: spoton-${{ matrix.arch }}-darwin
          path: ${{ env.SOURCE_DIR }}/target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
          retention-days: 30

  lipo:
    name: Create macOS Universal Binary
    runs-on: macos-15
    needs: build-macos

    steps:
      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: spoton-aarch64-darwin
          path: arm64

      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: spoton-x86_64-darwin
          path: x86_64

      - name: Create Universal Binary
        run: |
          lipo -create -output spoton arm64/${{ env.BINARY_NAME }} x86_64/${{ env.BINARY_NAME }}
          chmod 755 spoton

      - name: Ad-hoc code sign
        run: codesign --force --sign - spoton

      - name: Verify Universal Binary
        run: |
          echo "=== lipo -info ==="
          lipo -info spoton
          echo "=== file ==="
          file spoton
          echo "=== codesign -dv ==="
          codesign -dv spoton 2>&1
          echo "=== SHA256 ==="
          shasum -a 256 spoton

      - name: Upload Universal Binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: spoton-darwin
          path: spoton
          retention-days: 30

  reuse-binaries:
    name: Reuse binaries from previous release
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.rust_changed == 'false'
    permissions:
      contents: read

    steps:
      - name: Find previous release tag
        id: prev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 10 --json tagName --jq '.[].tagName' | grep '^v' | head -1)
          echo "Downloading binaries from $PREV_TAG"
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Download binaries from previous release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.prev.outputs.prev_tag }}" --repo "$GITHUB_REPOSITORY" -p 'spoton-*' -D prev-binaries/

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/{x86_64-linux,aarch64-linux,armhf-linux,arm-linux,i386-linux,x86_64-win64,darwin}
          cp prev-binaries/spoton-x86_64-linux artifacts/x86_64-linux/spoton
          cp prev-binaries/spoton-aarch64-linux artifacts/aarch64-linux/spoton
          cp prev-binaries/spoton-armhf-linux artifacts/armhf-linux/spoton
          cp prev-binaries/spoton-arm-linux artifacts/arm-linux/spoton
          cp prev-binaries/spoton-i386-linux artifacts/i386-linux/spoton
          cp prev-binaries/spoton-x86_64-win64.exe artifacts/x86_64-win64/spoton.exe
          cp prev-binaries/spoton-darwin artifacts/darwin/spoton
          chmod 755 artifacts/*/spoton*

      - name: Upload spoton-x86_64-linux
        uses: actions/upload-artifact@v4
        with:
          name: spoton-x86_64-linux
          path: artifacts/x86_64-linux/spoton
          retention-days: 30

      - name: Upload spoton-aarch64-linux
        uses: actions/upload-artifact@v4
        with:
          name: spoton-aarch64-linux
          path: artifacts/aarch64-linux/spoton
          retention-days: 30

      - name: Upload spoton-armhf-linux
        uses: actions/upload-artifact@v4
        with:
          name: spoton-armhf-linux
          path: artifacts/armhf-linux/spoton
          retention-days: 30

      - name: Upload spoton-arm-linux
        uses: actions/upload-artifact@v4
        with:
          name: spoton-arm-linux
          path: artifacts/arm-linux/spoton
          retention-days: 30

      - name: Upload spoton-i386-linux
        uses: actions/upload-artifact@v4
        with:
          name: spoton-i386-linux
          path: artifacts/i386-linux/spoton
          retention-days: 30

      - name: Upload spoton-x86_64-win64
        uses: actions/upload-artifact@v4
        with:
          name: spoton-x86_64-win64
          path: artifacts/x86_64-win64/spoton.exe
          retention-days: 30

      - name: Upload spoton-darwin
        uses: actions/upload-artifact@v4
        with:
          name: spoton-darwin
          path: artifacts/darwin/spoton
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [detect-changes, build, lipo, reuse-binaries]
    if: startsWith(github.ref, 'refs/tags/') && !cancelled() && !failure()
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Remove intermediate macOS artifacts
        run: |
          rm -rf release-artifacts/spoton-aarch64-darwin
          rm -rf release-artifacts/spoton-x86_64-darwin

      - name: Flatten binaries with platform suffix
        run: |
          mkdir -p release-flat
          for dir in release-artifacts/spoton-*/; do
            name=$(basename "$dir")
            if [ -f "$dir/spoton.exe" ]; then
              cp "$dir/spoton.exe" "release-flat/${name}.exe"
            elif [ -f "$dir/spoton" ]; then
              cp "$dir/spoton" "release-flat/$name"
            fi
          done
          ls -la release-flat/

      - name: Assemble plugin zip
        run: |
          for dir in release-artifacts/spoton-*/; do
            bin_dir=$(basename "$dir" | sed 's/^spoton-//')
            dest="Plugins/SpotOn/Bin/$bin_dir"
            mkdir -p "$dest"
            cp "$dir"/* "$dest/"
            chmod 755 "$dest"/*
            rm -f "$dest/.gitkeep"
          done
          VERSION="${GITHUB_REF_NAME}"
          zip -r "release-flat/SpotOn-${VERSION}.zip" Plugins/SpotOn/
          echo "=== Plugin zip ==="
          ls -lh "release-flat/SpotOn-${VERSION}.zip"
          echo "=== SHA1 for repo.xml ==="
          sha1sum "release-flat/SpotOn-${VERSION}.zip"

      - name: Create checksums
        run: |
          cd release-flat
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-flat/*
          generate_release_notes: true
          draft: false
          prerelease: false
