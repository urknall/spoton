name: Build librespot binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: spoton
  SOURCE_DIR: librespot-spoton

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            bin_dir: aarch64-linux
          - target: armv7-unknown-linux-musleabihf
            bin_dir: armhf-linux
          - target: arm-unknown-linux-musleabi
            bin_dir: arm-linux
          - target: i686-unknown-linux-musl
            bin_dir: i386-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          cross build --release --target ${{ matrix.target }}

      - name: Prepare binary
        run: |
          BINARY_PATH="${{ env.SOURCE_DIR }}/target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          DEST_DIR="Plugins/SpotOn/Bin/${{ matrix.bin_dir }}"
          mkdir -p "$DEST_DIR"
          cp "$BINARY_PATH" "$DEST_DIR/${{ env.BINARY_NAME }}"
          chmod 755 "$DEST_DIR/${{ env.BINARY_NAME }}"
          # Remove .gitkeep if present (binary replaces placeholder)
          rm -f "$DEST_DIR/.gitkeep"

      - name: Verify binary
        run: |
          BINARY="Plugins/SpotOn/Bin/${{ matrix.bin_dir }}/${{ env.BINARY_NAME }}"
          echo "=== Binary info ==="
          file "$BINARY"
          echo "=== Binary size ==="
          ls -la "$BINARY"
          echo "=== SHA256 checksum ==="
          sha256sum "$BINARY"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: spoton-${{ matrix.bin_dir }}
          path: Plugins/SpotOn/Bin/${{ matrix.bin_dir }}/spoton
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List downloaded artifacts
        run: find release-artifacts -type f -ls

      - name: Create checksums
        run: |
          cd release-artifacts
          find . -name "spoton" -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/spoton
            release-artifacts/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: false
