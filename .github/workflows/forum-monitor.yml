name: Forum Monitor

on:
  schedule:
    - cron: '17,47 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: [self-hosted, spoton]
    env:
      STATE_DIR: /home/sti/.spoton-forum-monitor
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: .github/scripts/forum-monitor
        run: npm ci

      - name: Install Playwright browsers
        working-directory: .github/scripts/forum-monitor
        run: npx playwright install chromium --with-deps 2>/dev/null || npx playwright install chromium

      - name: Restore state
        working-directory: .github/scripts/forum-monitor
        run: |
          mkdir -p "$STATE_DIR"
          [ -f "$STATE_DIR/forum-state.json" ] && cp "$STATE_DIR/forum-state.json" forum-state.json || true

      - name: Run forum monitor
        working-directory: .github/scripts/forum-monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATE_PATH: forum-state.json
        run: node index.js

      - name: Save state
        if: always()
        working-directory: .github/scripts/forum-monitor
        run: |
          [ -f forum-state.json ] && cp forum-state.json "$STATE_DIR/forum-state.json" || true

      - name: Commit state to repo
        if: always()
        working-directory: .github/scripts/forum-monitor
        run: |
          git add forum-state.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update forum monitor state [skip ci]"
          git pull --rebase
          git push
