name: Forum Monitor

on:
  schedule:
    - cron: '17,47 * * * *'   # Every 30 minutes (offset to avoid :00/:30 congestion)
  workflow_dispatch:            # Manual trigger for testing

permissions:
  issues: write
  actions: write               # For artifact upload/download

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: .github/scripts/forum-monitor
        run: npm ci

      - name: Install Playwright browsers
        working-directory: .github/scripts/forum-monitor
        run: npx playwright install chromium --with-deps

      - name: Download state artifact
        uses: actions/download-artifact@v4
        with:
          name: forum-monitor-state
          path: .github/scripts/forum-monitor
        continue-on-error: true  # First run has no artifact

      - name: Run forum monitor
        working-directory: .github/scripts/forum-monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATE_PATH: forum-state.json
        run: node index.js

      - name: Upload state artifact
        uses: actions/upload-artifact@v4
        with:
          name: forum-monitor-state
          path: .github/scripts/forum-monitor/forum-state.json
          retention-days: 90
          overwrite: true
