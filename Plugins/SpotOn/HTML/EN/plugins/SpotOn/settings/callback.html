<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SpotOn - Callback</title>
</head>
<body style="font-family:sans-serif;padding:24px">

[% IF success %]
<h2 style="color:green">Erfolgreich verbunden!</h2>
<p>Du wirst gleich zu den Einstellungen weitergeleitet...</p>
[% IF displayName %]
<p>Verbunden als: <strong>[% displayName | html %]</strong></p>
[% END %]
<script>
setTimeout(function() {
    window.location = "[% webroot | html %]settings/plugin/spoton.html";
}, 2000);
</script>
[% ELSE %]
<h2 style="color:red">Verbindung fehlgeschlagen</h2>
<p style="color:red">[% errorMessage | html %]</p>
<p><a href="[% webroot | html %]settings/plugin/spoton.html">Zurueck zu den Einstellungen</a></p>
[% END %]

</body>
</html>
