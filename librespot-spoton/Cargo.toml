[package]
name = "spoton"
version = "1.0.0"
edition = "2021"
authors = ["SpotOn Contributors"]
description = "SpotOn librespot integration binary for LMS"
license = "MIT"

[[bin]]
name = "spoton"
path = "src/main.rs"

[dependencies]
librespot-core = { version = "0.8", default-features = false, features = ["rustls-tls-native-roots"] }
serde_json     = "1"
tokio          = { version = "1", features = ["rt-multi-thread", "macros"] }
